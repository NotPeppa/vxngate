name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release Archive
        run: |
          # 创建发布目录
          mkdir -p release
          
          # 复制必要文件
          cp docker-compose.yml release/
          cp start.sh release/
          cp start.bat release/
          cp README.md release/
          cp README-Windows.md release/
          cp QUICK-START.md release/
          cp INDEX.md release/
          
          # 创建压缩包
          cd release
          zip -r ../vpngate-socks5-${GITHUB_REF_NAME}.zip .
          cd ..
          tar -czf vpngate-socks5-${GITHUB_REF_NAME}.tar.gz -C release .

      - name: Extract Release Notes
        id: extract-notes
        run: |
          # 提取版本号
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # 生成发布说明
          cat > release-notes.md << 'EOF'
          ## 🚀 VPN Gate SOCKS5 代理管理系统 ${GITHUB_REF_NAME}
          
          ### 功能特性
          
          - ✅ 自动获取 VPN Gate 服务器列表
          - ✅ Web 管理界面，一键连接
          - ✅ 快速切换服务器，无需重启
          - ✅ 实时显示连接状态
          - ✅ 服务器筛选和排序
          - ✅ Docker 容器化部署
          
          ### 快速开始
          
          #### 使用 Docker Compose（推荐）
          
          ```bash
          # 1. 下载并解压发布包
          # 2. 启动服务
          docker-compose up -d
          
          # 3. 打开浏览器
          http://localhost:5000
          ```
          
          #### 使用预构建镜像
          
          ```bash
          docker pull ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME}
          
          docker run -d \
            --name vpngate-socks5 \
            --cap-add=NET_ADMIN \
            --device=/dev/net/tun \
            -p 1080:1080 \
            -p 5000:5000 \
            ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME}
          ```
          
          ### 文档
          
          - 📖 [快速开始指南](https://github.com/${{ github.repository }}/blob/${GITHUB_REF_NAME}/QUICK-START.md)
          - 🪟 [Windows 用户指南](https://github.com/${{ github.repository }}/blob/${GITHUB_REF_NAME}/README-Windows.md)
          - 📘 [完整文档](https://github.com/${{ github.repository }}/blob/${GITHUB_REF_NAME}/README.md)
          
          ### Docker 镜像
          
          - `ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME}`
          - `ghcr.io/${{ github.repository }}:latest`
          
          ### 系统要求
          
          - Docker 20.10+
          - Docker Compose 1.29+
          - 2GB 可用内存
          
          ### 更新日志
          
          查看完整更新日志：[CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${GITHUB_REF_NAME}/CHANGELOG.md)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            vpngate-socks5-${{ github.ref_name }}.zip
            vpngate-socks5-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
