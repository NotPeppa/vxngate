name: Test Build

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

jobs:
  test-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker build
        run: |
          docker build -t vpngate-socks5:test .

      - name: Test Docker Compose
        run: |
          # 测试 docker-compose 配置
          docker-compose config

      - name: Verify files
        run: |
          # 检查必要文件是否存在
          test -f Dockerfile
          test -f docker-compose.yml
          test -f web/app.py
          test -f web/templates/index.html
          test -f web/requirements.txt
          test -f danted.conf
          test -f entrypoint-web.sh
          test -f README.md
          echo "✅ All required files exist"

      - name: Check Python syntax
        run: |
          docker run --rm -v $(pwd)/web:/app python:3.11-slim \
            python -m py_compile /app/app.py
          echo "✅ Python syntax check passed"

      - name: Validate HTML
        run: |
          # 简单的 HTML 语法检查
          grep -q "<!DOCTYPE html>" web/templates/index.html
          grep -q "</html>" web/templates/index.html
          echo "✅ HTML validation passed"
