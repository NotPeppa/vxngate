version: '3.8'

services:
  vpngate-socks:
    build: .
    container_name: vpngate-socks5-web
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - "1080:1080"  # SOCKS5 代理端口
      - "5000:5000"  # Web 管理界面端口
    environment:
      - SOCKS_USERNAME=${SOCKS_USERNAME:-socks}
      - SOCKS_PASSWORD=${SOCKS_PASSWORD:-change_me_now}
      - WEB_USERNAME=${WEB_USERNAME:-admin}
      - WEB_PASSWORD=${WEB_PASSWORD:-admin_change_me}
      - WEB_SESSION_SECRET=${WEB_SESSION_SECRET:-change_this_session_secret}
    volumes:
      - ./config:/config  # 持久化配置
    restart: unless-stopped
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
