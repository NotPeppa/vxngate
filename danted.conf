# SOCKS5 代理服务器配置（默认启用用户名密码认证）
# 注意：容器启动时 entrypoint-web.sh 会按环境变量重写该文件
logoutput: stderr

internal: 0.0.0.0 port = 1080
external: vpn_vpn

clientmethod: none
socksmethod: username

user.privileged: root
user.unprivileged: nobody

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    socksmethod: username
    log: error
}
