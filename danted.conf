# SOCKS5 代理服务器配置
logoutput: stderr

# 内部接口（监听所有接口）
internal: 0.0.0.0 port = 1080

# 外部接口（通过 VPN 虚拟网卡）
external: vpn_vpn

# 认证方法：无需认证
clientmethod: none
socksmethod: none

# 客户端访问规则
client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error
}

# SOCKS 转发规则
socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error
}
