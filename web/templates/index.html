<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Gate SOCKS5 ϊ╗μύΡΗύχκύΡΗ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #28a745;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-weight: 500;
            color: #666;
        }

        .socks-info {
            margin-left: auto;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            font-family: monospace;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            background: #475569;
            color: white;
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .filter-item label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .filter-item input,
        .filter-item select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .server-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .server-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .server-card.connected {
            border: 2px solid #28a745;
        }

        .server-card.last-attempted {
            border: 2px solid #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .country {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .flag {
            font-size: 24px;
        }

        .score {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .server-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .server-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .protocol-tags {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .protocol-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid #cbd5e1;
            color: #334155;
            background: #f8fafc;
        }

        .protocol-tag.supported {
            border-color: #16a34a;
            color: #166534;
            background: #dcfce7;
        }

        .ip-address {
            font-family: monospace;
            font-size: 12px;
            color: #666;
        }

        .connect-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .connect-btn:hover {
            background: #218838;
        }

        .connect-btn.connected {
            background: #dc3545;
        }

        .connect-btn.connected:hover {
            background: #c82333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            color: #666;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .message-box {
            margin-top: 16px;
            border-radius: 8px;
            padding: 12px 14px;
            display: none;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.45;
            border: 1px solid transparent;
        }

        .message-box.success {
            display: block;
            background: #dcfce7;
            border-color: #86efac;
            color: #14532d;
        }

        .message-box.error {
            display: block;
            background: #fee2e2;
            border-color: #fecaca;
            color: #7f1d1d;
        }

        .message-actions {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .copy-btn {
            background: #0f172a;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .copy-feedback {
            font-size: 12px;
            color: #64748b;
            min-height: 18px;
        }

        .copy-feedback.success {
            color: #166534;
        }

        .copy-feedback.error {
            color: #991b1b;
        }

        .connection-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(2px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .connection-overlay.show {
            display: flex;
        }

        .connection-panel {
            width: min(460px, 92vw);
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.25);
            padding: 24px;
            text-align: center;
        }

        .connection-panel .spinner {
            border: 4px solid rgba(102, 126, 234, 0.25);
            border-top: 4px solid #667eea;
            margin: 0 auto 14px;
        }

        .connection-title {
            font-size: 18px;
            color: #0f172a;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .connection-desc {
            font-size: 14px;
            color: #475569;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ΏθγΑ VPN Gate SOCKS5 ϊ╗μύΡΗύχκύΡΗ</h1>
            <p style="color: #666; margin-top: 5px;">ϋΘςίΛρϋΟ╖ίΠΨί╣╢ύχκύΡΗ VPN Gate όεΞίΛκίβρΎ╝Νϊ╕ΑώΦχίΙΘόΞλ SOCKS5 ϊ╗μύΡΗ</p>
            
            <div class="status-bar">
                <div class="status-indicator" id="statusIndicator"></div>
                <span class="status-text" id="statusText">όεςϋ┐ηόΟξ</span>
                <div class="socks-info">SOCKS5: localhost:1080</div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="refreshServers()">ΏθΦΕ ίΙ╖όΨ░όεΞίΛκίβρίΙΩϋκρ</button>
                <select id="protocolSelect" class="btn btn-secondary" style="min-width: 170px;">
                    <option value="softether">SoftEther</option>
                    <option value="openvpn">OpenVPN</option>
                </select>
                <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>έζΝ όΨφί╝Αϋ┐ηόΟξ</button>
                <button class="btn btn-secondary" onclick="logout()">Ώθγς ώΑΑίΘ║ύβ╗ί╜Χ</button>
            </div>

            <div id="messageBox" class="message-box"></div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <div class="filter-item">
                    <label>όΡεύ┤λίδ╜ίχ╢</label>
                    <input type="text" id="countryFilter" placeholder="ϋ╛ΥίΖξίδ╜ίχ╢ίΡΞύπ░..." onkeyup="filterServers()">
                </div>
                <div class="filter-item">
                    <label>όΟΤί║ΠόΨ╣ί╝Π</label>
                    <select id="sortBy" onchange="filterServers()">
                        <option value="score">όΟρϋΞΡίΙΗόΧ░</option>
                        <option value="speed">ώΑθί║ο</option>
                        <option value="ping">ί╗╢ϋ┐θ</option>
                        <option value="uptime">ίερύ║┐όΩ╢ώΧ┐</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>όεΑί░ΠώΑθί║ο (Mbps)</label>
                    <input type="number" id="minSpeed" placeholder="0" onchange="filterServers()">
                </div>
            </div>
        </div>

        <div id="serversContainer">
            <div class="loading">
                <div class="spinner"></div>
                όφμίερίΛιϋ╜╜όεΞίΛκίβρίΙΩϋκρ...
            </div>
        </div>
    </div>

    <div id="connectionOverlay" class="connection-overlay" aria-live="polite" aria-busy="true">
        <div class="connection-panel">
            <div class="spinner"></div>
            <div class="connection-title" id="connectionTitle">όφμίερϋ┐ηόΟξ...</div>
            <div class="connection-desc" id="connectionDesc">όφμίερί╗║ύτΜ VPN ϊ╝γϋψζί╣╢όικώςΝ SOCKS5 ίΠψύΦρόΑπΎ╝Νϋψ╖ύρΞίΑβ</div>
        </div>
    </div>

    <script>
        let allServers = [];
        let currentConnection = null;
        let lastErrorText = '';
        let copyFeedbackTimer = null;
        let isConnecting = false;
        let lastAttemptedServer = null;

        // ίδ╜ίχ╢ϊ╗μύιΒίΙ░ emoji όΩΩί╕εύγΕόαιί░Ε
        const countryFlags = {
            'JP': 'ΏθΘψΏθΘ╡', 'US': 'ΏθΘ║ΏθΘ╕', 'KR': 'ΏθΘ░ΏθΘ╖', 'CN': 'ΏθΘρΏθΘ│', 'TW': 'ΏθΘ╣ΏθΘ╝',
            'HK': 'ΏθΘφΏθΘ░', 'SG': 'ΏθΘ╕ΏθΘυ', 'GB': 'ΏθΘυΏθΘπ', 'DE': 'ΏθΘσΏθΘς', 'FR': 'ΏθΘτΏθΘ╖',
            'CA': 'ΏθΘρΏθΘο', 'AU': 'ΏθΘοΏθΘ║', 'NL': 'ΏθΘ│ΏθΘ▒', 'RU': 'ΏθΘ╖ΏθΘ║', 'TH': 'ΏθΘ╣ΏθΘφ',
            'VN': 'ΏθΘ╗ΏθΘ│', 'IN': 'ΏθΘχΏθΘ│', 'BR': 'ΏθΘπΏθΘ╖', 'MX': 'ΏθΘ▓ΏθΘ╜', 'AR': 'ΏθΘοΏθΘ╖',
            'MM': 'ΏθΘ▓ΏθΘ▓'
        };

        function getFlag(countryCode) {
            return countryFlags[countryCode] || 'ΏθΝΞ';
        }

        function formatSpeed(speed) {
            if (speed > 1000) {
                return (speed / 1000).toFixed(1) + ' Gbps';
            }
            return speed + ' Mbps';
        }

        function formatTraffic(bytes) {
            const gb = bytes / (1024 * 1024 * 1024);
            if (gb > 1000) {
                return (gb / 1024).toFixed(1) + ' TB';
            }
            return gb.toFixed(1) + ' GB';
        }

        function showMessage(type, text, details = '') {
            const box = document.getElementById('messageBox');
            const detailText = details ? `\n\nϋψοόΔΖ:\n${details}` : '';
            const fullText = `${text}${detailText}`;
            lastErrorText = fullText;

            box.className = `message-box ${type}`;
            box.innerHTML = `
                <div id="messageText"></div>
                <div class="message-actions">
                    <button class="copy-btn" onclick="copyLastMessage()">ίνΞίΙ╢ϊ┐κόΒψ</button>
                    <span id="copyFeedback" class="copy-feedback"></span>
                </div>
            `;

            document.getElementById('messageText').textContent = fullText;
            if (copyFeedbackTimer) {
                clearTimeout(copyFeedbackTimer);
                copyFeedbackTimer = null;
            }
        }

        function setCopyFeedback(type, text) {
            const feedback = document.getElementById('copyFeedback');
            if (!feedback) return;

            feedback.className = `copy-feedback ${type}`;
            feedback.textContent = text;

            if (copyFeedbackTimer) {
                clearTimeout(copyFeedbackTimer);
            }
            copyFeedbackTimer = setTimeout(() => {
                const currentFeedback = document.getElementById('copyFeedback');
                if (!currentFeedback) return;
                currentFeedback.className = 'copy-feedback';
                currentFeedback.textContent = '';
            }, 1800);
        }

        function setConnectingState(connecting, ip = '', port = 443) {
            isConnecting = connecting;
            document.body.style.cursor = connecting ? 'progress' : '';
            const overlay = document.getElementById('connectionOverlay');
            const title = document.getElementById('connectionTitle');
            const desc = document.getElementById('connectionDesc');

            if (overlay) {
                overlay.classList.toggle('show', connecting);
            }

            if (title) {
                title.textContent = connecting ? 'όφμίερϋ┐ηόΟξ...' : 'όφμίερϋ┐ηόΟξ...';
            }
            if (desc) {
                desc.textContent = connecting
                    ? `όφμίερϋ┐ηόΟξ ${ip}:${port}Ύ╝Νί╣╢ύφΚί╛ΖώγπώΒΥϊ╕Οϊ╗μύΡΗί░▒ύ╗ς`
                    : 'όφμίερί╗║ύτΜ VPN ϊ╝γϋψζί╣╢όικώςΝ SOCKS5 ίΠψύΦρόΑπΎ╝Νϋψ╖ύρΞίΑβ';
            }

            document.querySelectorAll('.connect-btn').forEach((btn) => {
                btn.disabled = connecting;
                btn.style.opacity = connecting ? '0.65' : '';
                btn.style.cursor = connecting ? 'not-allowed' : '';
                if (connecting) {
                    btn.dataset.originalText = btn.textContent;
                    btn.textContent = 'ϋ┐ηόΟξϊ╕φ...';
                } else if (btn.dataset.originalText) {
                    btn.textContent = btn.dataset.originalText;
                    delete btn.dataset.originalText;
                }
            });

            const disconnectBtn = document.getElementById('disconnectBtn');
            if (disconnectBtn) {
                disconnectBtn.disabled = connecting || !currentConnection;
            }
        }

        async function copyLastMessage() {
            if (!lastErrorText) return;
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(lastErrorText);
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = lastErrorText;
                    textarea.setAttribute('readonly', '');
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.select();
                    const ok = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    if (!ok) {
                        throw new Error('execCommand copy failed');
                    }
                }
                setCopyFeedback('success', 'ί╖▓ίνΞίΙ╢');
            } catch (e) {
                setCopyFeedback('error', 'ίνΞίΙ╢ίν▒ϋ┤ξΎ╝Νϋψ╖όΚΜίΛρίνΞίΙ╢');
            }
        }

        async function loadServers(force = false) {
            try {
                console.log('ί╝ΑίπΜίΛιϋ╜╜όεΞίΛκίβρίΙΩϋκρ...', force ? '(ί╝║ίΙ╢ίΙ╖όΨ░)' : '(ϊ╜┐ύΦρύ╝Υίφα)');
                const url = force ? '/api/servers?force=1' : '/api/servers';
                const response = await fetch(url);
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                console.log('API ίΥΞί║ΦύΛ╢όΑΒ:', response.status);
                
                const data = await response.json();
                console.log('API ίΥΞί║ΦόΧ░όΞχ:', data);
                
                if (data.success) {
                    allServers = data.servers;
                    console.log('ϋΟ╖ίΠΨίΙ░όεΞίΛκίβρόΧ░ώΘΠ:', allServers.length);
                    
                    if (allServers.length === 0) {
                        document.getElementById('serversContainer').innerHTML = `
                            <div class="empty-state">
                                <h3>έγιΎ╕Π ό▓κόεΚόΚ╛ίΙ░όεΞίΛκίβρ</h3>
                                <p>VPN Gate API ϋ┐Φίδηϊ║Ηύσ║ίΙΩϋκρ</p>
                                <p style="font-size: 14px; color: #666;">ίΠψϋΔ╜ίΟθίδιΎ╝γ</p>
                                <ul style="text-align: left; display: inline-block; color: #666;">
                                    <li>VPN Gate όεΞίΛκόγΓόΩ╢ϊ╕ΞίΠψύΦρ</li>
                                    <li>ύ╜Σύ╗εϋ┐ηόΟξώΩχώλα</li>
                                    <li>API όι╝ί╝ΠίΠαόδ┤</li>
                                </ul>
                                <button class="btn btn-primary" onclick="loadServers()" style="margin-top: 20px;">ώΘΞϋψΧ</button>
                                <button class="btn btn-primary" onclick="testAPI()" style="margin-top: 20px; margin-left: 10px;">ό╡ΜϋψΧ API</button>
                            </div>
                        `;
                    } else {
                        filterServers();
                    }
                } else {
                    throw new Error('API ϋ┐Φίδηίν▒ϋ┤ξύΛ╢όΑΒ');
                }
            } catch (error) {
                console.error('ίΛιϋ╜╜όεΞίΛκίβρίν▒ϋ┤ξ:', error);
                document.getElementById('serversContainer').innerHTML = `
                    <div class="empty-state">
                        <h3>έζΝ ίΛιϋ╜╜ίν▒ϋ┤ξ</h3>
                        <p>όΩιό│ΧϋΟ╖ίΠΨόεΞίΛκίβρίΙΩϋκρ</p>
                        <p style="font-size: 14px; color: #666;">ώΦβϋψψ: ${error.message}</p>
                        <button class="btn btn-primary" onclick="loadServers()" style="margin-top: 20px;">ώΘΞϋψΧ</button>
                        <button class="btn btn-primary" onclick="testAPI()" style="margin-top: 20px; margin-left: 10px;">ό╡ΜϋψΧ API</button>
                    </div>
                `;
            }
        }

        async function testAPI() {
            try {
                const response = await fetch('/api/test');
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                const data = await response.json();
                showMessage('success', 'API ό╡ΜϋψΧίχΝόΙΡ', JSON.stringify(data, null, 2));
            } catch (error) {
                showMessage('error', 'API ό╡ΜϋψΧίν▒ϋ┤ξ', error.message);
            }
        }

        function filterServers() {
            const countryFilter = document.getElementById('countryFilter').value.toLowerCase();
            const sortBy = document.getElementById('sortBy').value;
            const minSpeed = parseInt(document.getElementById('minSpeed').value) || 0;
            const protocol = document.getElementById('protocolSelect')?.value || 'softether';

            let filtered = allServers.filter(server => {
                const matchCountry = server.country.toLowerCase().includes(countryFilter);
                const matchSpeed = server.speed >= minSpeed;
                const matchProtocol = protocol === 'openvpn' ? !!server.supports_openvpn : true;
                return matchCountry && matchSpeed && matchProtocol;
            });

            // όΟΤί║Π
            filtered.sort((a, b) => {
                switch(sortBy) {
                    case 'speed':
                        return b.speed - a.speed;
                    case 'ping':
                        return a.ping - b.ping;
                    case 'uptime':
                        return b.uptime - a.uptime;
                    default:
                        return b.score - a.score;
                }
            });

            renderServers(filtered);
        }

        function renderServers(servers) {
            const container = document.getElementById('serversContainer');
            
            if (servers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>ΏθαΧ ό▓κόεΚόΚ╛ίΙ░όεΞίΛκίβρ</h3>
                        <p>ί░ζϋψΧϋ░ΔόΧ┤ύφδώΑΚόζκϊ╗╢</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="servers-grid">
                    ${servers.map(server => `
                        <div class="server-card ${currentConnection && currentConnection.ip === server.ip ? 'connected' : ''} ${lastAttemptedServer === `${server.ip}:${server.port}` ? 'last-attempted' : ''}" 
                             onclick="connectToServer('${server.ip}', ${server.port})">
                            <div class="server-header">
                                <div class="country">
                                    <span class="flag">${getFlag(server.country_code)}</span>
                                    <span>${server.country}</span>
                                </div>
                                <div class="score">${server.score}</div>
                            </div>
                            <div class="protocol-tags">
                                <span class="protocol-tag supported">SoftEther</span>
                                <span class="protocol-tag ${server.supports_openvpn ? 'supported' : ''}">${server.supports_openvpn ? 'OpenVPN' : 'OpenVPN(ϊ╕ΞόΦψόΝΒ)'}</span>
                            </div>
                             
                            <div class="server-info">
                                <div class="info-item">
                                    <span class="info-label">ώΑθί║ο</span>
                                    <span class="info-value">${formatSpeed(server.speed)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">ί╗╢ϋ┐θ</span>
                                    <span class="info-value">${server.ping} ms</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">ίερύ║┐όΩ╢ώΧ┐</span>
                                    <span class="info-value">${Math.floor(server.uptime / 86400)} ίνσ</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">ύΦρόΙ╖όΧ░</span>
                                    <span class="info-value">${server.sessions} / ${server.total_users}</span>
                                </div>
                            </div>
                            
                            <div class="server-footer">
                                <span class="ip-address">${server.ip}:${server.port}${server.supports_openvpn ? ' ┬╖ OVPN' : ''}${lastAttemptedServer === `${server.ip}:${server.port}` ? ' ┬╖ όεΑϋ┐Σί░ζϋψΧ' : ''}</span>
                                <button class="connect-btn ${currentConnection && currentConnection.ip === server.ip ? 'connected' : ''}" 
                                        onclick="event.stopPropagation(); connectToServer('${server.ip}', ${server.port})">
                                    ${currentConnection && currentConnection.ip === server.ip ? 'όΨφί╝Α' : 'ϋ┐ηόΟξ'}
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function connectToServer(ip, port) {
            if (isConnecting) {
                return;
            }

            const protocol = document.getElementById('protocolSelect')?.value || 'softether';

            lastAttemptedServer = `${ip}:${port}`;
            filterServers();

            if (currentConnection && currentConnection.ip === ip && (currentConnection.protocol || 'softether') === protocol) {
                await disconnect();
                return;
            }

            try {
                setConnectingState(true, ip, port);
                await new Promise(resolve => requestAnimationFrame(resolve));

                const response = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip, port, protocol }),
                    signal: AbortSignal.timeout(90000)
                });
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                const raw = await response.text();
                let data = null;
                try {
                    data = raw ? JSON.parse(raw) : null;
                } catch (e) {
                    data = {
                        success: false,
                        error: `όεΞίΛκύτψϋ┐Φίδηϊ║Ηώζη JSON ίΥΞί║ΦΎ╝ΙHTTP ${response.status}Ύ╝Κ`,
                        message: raw ? raw.slice(0, 400) : 'ίΥΞί║Φϊ╕║ύσ║'
                    };
                }
                
                const targetServer = `${ip}:${port}`;
                const protocolName = protocol === 'openvpn' ? 'OpenVPN' : 'SoftEther';

                if (response.ok && data && data.success) {
                    showMessage('success', `ϋ┐ηόΟξόΙΡίΛθΎ╝Ι${protocolName}Ύ╝ΚΎ╝ΝSOCKS5 ϊ╗μύΡΗί╖▓ίΡψίΛρίερ localhost:1080`, data.warning || '');
                    await updateStatus();
                } else {
                    const errMsg = (data && (data.error || data.message)) || `HTTP ${response.status}`;
                    showMessage('error', `ϋ┐ηόΟξίν▒ϋ┤ξΎ╝Ι${protocolName} / ${targetServer}Ύ╝Κ`, errMsg);
                }
            } catch (error) {
                console.error('ϋ┐ηόΟξίν▒ϋ┤ξ:', error);
                showMessage('error', `ϋ┐ηόΟξίν▒ϋ┤ξΎ╝Νϋψ╖ώΘΞϋψΧΎ╝Ι${ip}:${port}Ύ╝Κ`, error.message);
            } finally {
                setConnectingState(false);
            }
        }

        async function disconnect() {
            try {
                const response = await fetch('/api/disconnect', {
                    method: 'POST'
                });
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                const raw = await response.text();
                let data = null;
                try {
                    data = raw ? JSON.parse(raw) : null;
                } catch (e) {
                    data = {
                        success: false,
                        error: `όεΞίΛκύτψϋ┐Φίδηϊ║Ηώζη JSON ίΥΞί║ΦΎ╝ΙHTTP ${response.status}Ύ╝Κ`,
                        message: raw ? raw.slice(0, 400) : 'ίΥΞί║Φϊ╕║ύσ║'
                    };
                }
                
                if (response.ok && data && data.success) {
                    showMessage('success', 'ί╖▓όΨφί╝Αϋ┐ηόΟξ');
                    await updateStatus();
                } else {
                    showMessage('error', 'όΨφί╝Αίν▒ϋ┤ξ', (data && (data.error || data.message)) || `HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('όΨφί╝Αίν▒ϋ┤ξ:', error);
                showMessage('error', 'όΨφί╝Αίν▒ϋ┤ξ', error.message);
            }
        }

        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                const raw = await response.text();
                let data = null;
                try {
                    data = raw ? JSON.parse(raw) : null;
                } catch (e) {
                    throw new Error(`όεΞίΛκύτψϋ┐Φίδηϊ║Ηώζη JSON ίΥΞί║ΦΎ╝ΙHTTP ${response.status}Ύ╝Κ`);
                }
                
                if (response.ok && data && data.success) {
                    const status = data.status;
                    const indicator = document.getElementById('statusIndicator');
                    const statusText = document.getElementById('statusText');
                    const disconnectBtn = document.getElementById('disconnectBtn');
                    
                    if (status.connected) {
                        indicator.classList.add('connected');
                        const protocolName = (status.current_server?.protocol || 'softether') === 'openvpn' ? 'OpenVPN' : 'SoftEther';
                        statusText.textContent = `ί╖▓ϋ┐ηόΟξ(${protocolName}): ${status.current_server?.ip || 'όεςύθξ'}`;
                        disconnectBtn.disabled = false;
                        currentConnection = status.current_server;
                    } else {
                        indicator.classList.remove('connected');
                        statusText.textContent = 'όεςϋ┐ηόΟξ';
                        disconnectBtn.disabled = true;
                        currentConnection = null;
                    }
                    
                    filterServers(); // ώΘΞόΨ░ό╕▓όθΥϊ╗ξόδ┤όΨ░ϋ┐ηόΟξύΛ╢όΑΒ
                } else {
                    throw new Error((data && (data.error || data.message)) || `HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('όδ┤όΨ░ύΛ╢όΑΒίν▒ϋ┤ξ:', error);
            }
        }

        function refreshServers() {
            document.getElementById('serversContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    όφμίερίΙ╖όΨ░όεΞίΛκίβρίΙΩϋκρ...
                </div>
            `;
            loadServers(true);
        }

        function logout() {
            window.location.href = '/logout';
        }

        // ίΙζίπΜίΝΨ
        const protocolSelect = document.getElementById('protocolSelect');
        if (protocolSelect) {
            protocolSelect.addEventListener('change', () => filterServers());
        }

        loadServers();
        updateStatus();
        
        // ίχγόεθόδ┤όΨ░ύΛ╢όΑΒ
        setInterval(updateStatus, 10000);
    </script>
</body>
</html>
