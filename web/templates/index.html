<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Gate SOCKS5 代理管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #28a745;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-weight: 500;
            color: #666;
        }

        .socks-info {
            margin-left: auto;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            font-family: monospace;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .filter-item label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .filter-item input,
        .filter-item select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .server-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .server-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .server-card.connected {
            border: 2px solid #28a745;
        }

        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .country {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .flag {
            font-size: 24px;
        }

        .score {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .server-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .server-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .ip-address {
            font-family: monospace;
            font-size: 12px;
            color: #666;
        }

        .connect-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .connect-btn:hover {
            background: #218838;
        }

        .connect-btn.connected {
            background: #dc3545;
        }

        .connect-btn.connected:hover {
            background: #c82333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            color: #666;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 VPN Gate SOCKS5 代理管理</h1>
            <p style="color: #666; margin-top: 5px;">自动获取并管理 VPN Gate 服务器，一键切换 SOCKS5 代理</p>
            
            <div class="status-bar">
                <div class="status-indicator" id="statusIndicator"></div>
                <span class="status-text" id="statusText">未连接</span>
                <div class="socks-info">SOCKS5: localhost:1080</div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="refreshServers()">🔄 刷新服务器列表</button>
                <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>❌ 断开连接</button>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <div class="filter-item">
                    <label>搜索国家</label>
                    <input type="text" id="countryFilter" placeholder="输入国家名称..." onkeyup="filterServers()">
                </div>
                <div class="filter-item">
                    <label>排序方式</label>
                    <select id="sortBy" onchange="filterServers()">
                        <option value="score">推荐分数</option>
                        <option value="speed">速度</option>
                        <option value="ping">延迟</option>
                        <option value="uptime">在线时长</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>最小速度 (Mbps)</label>
                    <input type="number" id="minSpeed" placeholder="0" onchange="filterServers()">
                </div>
            </div>
        </div>

        <div id="serversContainer">
            <div class="loading">
                <div class="spinner"></div>
                正在加载服务器列表...
            </div>
        </div>
    </div>

    <script>
        let allServers = [];
        let currentConnection = null;

        // 国家代码到 emoji 旗帜的映射
        const countryFlags = {
            'JP': '🇯🇵', 'US': '🇺🇸', 'KR': '🇰🇷', 'CN': '🇨🇳', 'TW': '🇹🇼',
            'HK': '🇭🇰', 'SG': '🇸🇬', 'GB': '🇬🇧', 'DE': '🇩🇪', 'FR': '🇫🇷',
            'CA': '🇨🇦', 'AU': '🇦🇺', 'NL': '🇳🇱', 'RU': '🇷🇺', 'TH': '🇹🇭',
            'VN': '🇻🇳', 'IN': '🇮🇳', 'BR': '🇧🇷', 'MX': '🇲🇽', 'AR': '🇦🇷',
            'MM': '🇲🇲'
        };

        function getFlag(countryCode) {
            return countryFlags[countryCode] || '🌍';
        }

        function formatSpeed(speed) {
            if (speed > 1000) {
                return (speed / 1000).toFixed(1) + ' Gbps';
            }
            return speed + ' Mbps';
        }

        function formatTraffic(bytes) {
            const gb = bytes / (1024 * 1024 * 1024);
            if (gb > 1000) {
                return (gb / 1024).toFixed(1) + ' TB';
            }
            return gb.toFixed(1) + ' GB';
        }

        async function loadServers() {
            try {
                console.log('开始加载服务器列表...');
                const response = await fetch('/api/servers');
                console.log('API 响应状态:', response.status);
                
                const data = await response.json();
                console.log('API 响应数据:', data);
                
                if (data.success) {
                    allServers = data.servers;
                    console.log('获取到服务器数量:', allServers.length);
                    
                    if (allServers.length === 0) {
                        document.getElementById('serversContainer').innerHTML = `
                            <div class="empty-state">
                                <h3>⚠️ 没有找到服务器</h3>
                                <p>VPN Gate API 返回了空列表</p>
                                <p style="font-size: 14px; color: #666;">可能原因：</p>
                                <ul style="text-align: left; display: inline-block; color: #666;">
                                    <li>VPN Gate 服务暂时不可用</li>
                                    <li>网络连接问题</li>
                                    <li>API 格式变更</li>
                                </ul>
                                <button class="btn btn-primary" onclick="loadServers()" style="margin-top: 20px;">重试</button>
                                <button class="btn btn-primary" onclick="testAPI()" style="margin-top: 20px; margin-left: 10px;">测试 API</button>
                            </div>
                        `;
                    } else {
                        filterServers();
                    }
                } else {
                    throw new Error('API 返回失败状态');
                }
            } catch (error) {
                console.error('加载服务器失败:', error);
                document.getElementById('serversContainer').innerHTML = `
                    <div class="empty-state">
                        <h3>❌ 加载失败</h3>
                        <p>无法获取服务器列表</p>
                        <p style="font-size: 14px; color: #666;">错误: ${error.message}</p>
                        <button class="btn btn-primary" onclick="loadServers()" style="margin-top: 20px;">重试</button>
                        <button class="btn btn-primary" onclick="testAPI()" style="margin-top: 20px; margin-left: 10px;">测试 API</button>
                    </div>
                `;
            }
        }

        async function testAPI() {
            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                alert('API 测试结果:\n' + JSON.stringify(data, null, 2));
            } catch (error) {
                alert('API 测试失败: ' + error.message);
            }
        }

        function filterServers() {
            const countryFilter = document.getElementById('countryFilter').value.toLowerCase();
            const sortBy = document.getElementById('sortBy').value;
            const minSpeed = parseInt(document.getElementById('minSpeed').value) || 0;

            let filtered = allServers.filter(server => {
                const matchCountry = server.country.toLowerCase().includes(countryFilter);
                const matchSpeed = server.speed >= minSpeed;
                return matchCountry && matchSpeed;
            });

            // 排序
            filtered.sort((a, b) => {
                switch(sortBy) {
                    case 'speed':
                        return b.speed - a.speed;
                    case 'ping':
                        return a.ping - b.ping;
                    case 'uptime':
                        return b.uptime - a.uptime;
                    default:
                        return b.score - a.score;
                }
            });

            renderServers(filtered);
        }

        function renderServers(servers) {
            const container = document.getElementById('serversContainer');
            
            if (servers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>😕 没有找到服务器</h3>
                        <p>尝试调整筛选条件</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="servers-grid">
                    ${servers.map(server => `
                        <div class="server-card ${currentConnection && currentConnection.ip === server.ip ? 'connected' : ''}" 
                             onclick="connectToServer('${server.ip}', ${server.port})">
                            <div class="server-header">
                                <div class="country">
                                    <span class="flag">${getFlag(server.country_code)}</span>
                                    <span>${server.country}</span>
                                </div>
                                <div class="score">${server.score}</div>
                            </div>
                            
                            <div class="server-info">
                                <div class="info-item">
                                    <span class="info-label">速度</span>
                                    <span class="info-value">${formatSpeed(server.speed)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">延迟</span>
                                    <span class="info-value">${server.ping} ms</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">在线时长</span>
                                    <span class="info-value">${Math.floor(server.uptime / 86400)} 天</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">用户数</span>
                                    <span class="info-value">${server.sessions} / ${server.total_users}</span>
                                </div>
                            </div>
                            
                            <div class="server-footer">
                                <span class="ip-address">${server.ip}:${server.port}</span>
                                <button class="connect-btn ${currentConnection && currentConnection.ip === server.ip ? 'connected' : ''}" 
                                        onclick="event.stopPropagation(); connectToServer('${server.ip}', ${server.port})">
                                    ${currentConnection && currentConnection.ip === server.ip ? '断开' : '连接'}
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function connectToServer(ip, port) {
            if (currentConnection && currentConnection.ip === ip) {
                await disconnect();
                return;
            }

            try {
                const response = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip, port })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ 连接成功！SOCKS5 代理已启动在 localhost:1080');
                    await updateStatus();
                } else {
                    alert('❌ 连接失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('连接失败:', error);
                alert('❌ 连接失败，请重试');
            }
        }

        async function disconnect() {
            try {
                const response = await fetch('/api/disconnect', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ 已断开连接');
                    await updateStatus();
                }
            } catch (error) {
                console.error('断开失败:', error);
            }
        }

        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.success) {
                    const status = data.status;
                    const indicator = document.getElementById('statusIndicator');
                    const statusText = document.getElementById('statusText');
                    const disconnectBtn = document.getElementById('disconnectBtn');
                    
                    if (status.connected) {
                        indicator.classList.add('connected');
                        statusText.textContent = `已连接: ${status.current_server?.ip || '未知'}`;
                        disconnectBtn.disabled = false;
                        currentConnection = status.current_server;
                    } else {
                        indicator.classList.remove('connected');
                        statusText.textContent = '未连接';
                        disconnectBtn.disabled = true;
                        currentConnection = null;
                    }
                    
                    filterServers(); // 重新渲染以更新连接状态
                }
            } catch (error) {
                console.error('更新状态失败:', error);
            }
        }

        function refreshServers() {
            document.getElementById('serversContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    正在刷新服务器列表...
                </div>
            `;
            loadServers();
        }

        // 初始化
        loadServers();
        updateStatus();
        
        // 定期更新状态
        setInterval(updateStatus, 10000);
    </script>
</body>
</html>
