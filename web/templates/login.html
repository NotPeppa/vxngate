<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Gate 登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
        }
        h1 {
            font-size: 22px;
            margin-bottom: 8px;
            color: #0f172a;
        }
        p {
            color: #475569;
            margin-bottom: 20px;
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #334155;
        }
        input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
            font-size: 14px;
        }
        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
            font-size: 14px;
        }
        button {
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 11px 14px;
            background: #0284c7;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0369a1; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VPN Gate 管理登录</h1>
        <p>请输入 Web 管理账号和密码。</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">登录</button>
        </form>
    </div>
</body>
</html>
